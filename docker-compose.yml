version: '3.8'

services:
  # Frontend - Next.js
  frontend:
    image: bombo/frontend:latest
    container_name: bombo-frontend
    pull_policy: never # 强制只使用本地镜像，绝不去远程 pull
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - bombo-network
    restart: unless-stopped

  # Backend - FastAPI
  backend:
    image: bombo/backend:latest
    container_name: bombo-backend
    pull_policy: never # 强制只使用本地镜像，绝不去远程 pull
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bombo:j9yd(2dWsdSi@postgres:5432/bombo
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9a0d5252a0732c928b4945ef2ba5d8e8f76a084fe257119f6cae444f6c9c0f1a
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bombo-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bombo-postgres
    environment:
      - POSTGRES_USER=bombo
      - POSTGRES_PASSWORD=j9yd(2dWsdSi
      - POSTGRES_DB=bombo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bombo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bombo -d bombo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bombo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bombo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: bombo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bombo-network
    restart: unless-stopped

networks:
  bombo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: